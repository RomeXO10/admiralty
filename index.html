<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admiralty</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0e14;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 8px 12px;
        background: rgba(10, 14, 20, 0.55);
        border: 1px solid rgba(180, 200, 220, 0.25);
        border-radius: 4px;
        color: #cfe3f2;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
